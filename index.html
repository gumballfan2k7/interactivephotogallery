<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

	<div id="image">
		Hover over an image below to display here.
	</div>
	
	<img class="preview" alt="This is a dog" src="https://files.catbox.moe/yf4ie3.webp" onmouseover="upDate(this)" onmouseleave="undo()">
	
	<img class="preview" alt="This is a cat" src="https://files.catbox.moe/ctkyb1.webp" onmouseover="upDate(this)" onmouseleave="undo()">
	
	<img class="preview" src="https://files.catbox.moe/3c4w1a.jpg" alt="This is both dog and cat" onmouseover="upDate(this)" onmouseleave="undo()">

	<script src="script.js"></script>
</body>
</html>
